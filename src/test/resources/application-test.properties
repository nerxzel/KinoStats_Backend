spring.datasource.url=jdbc:h2:mem:kinostats_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

sendgrid.api-key=test-key
sendgrid.from-email=test@kinostats.com
tmdb.api.key=test-key
tmdb.api.base-url=http://localhost:8089